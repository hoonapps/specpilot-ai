name: SpecPilot AI CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Render product plan PDF
        env:
          PRODUCT_PLAN_PDF_OUTPUT: ${{ runner.temp }}/shopping_purchase_decision_agent_plan.pdf
        run: |
          python scripts/render_product_plan_pdf.py
          test -s "$PRODUCT_PLAN_PDF_OUTPUT"

      - name: Upload product plan PDF
        uses: actions/upload-artifact@v4
        with:
          name: shopping-purchase-decision-agent-plan
          path: ${{ runner.temp }}/shopping_purchase_decision_agent_plan.pdf

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t specpilot-ai:ci .
